<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Hannah 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#FAF7F2;--blush:#F0DDD5;--rose:#C97D6E;--purple:#9B7BB5;
      --lavender:#C8B4DC;--mint:#A8C5A0;--gold:#D4A853;
      --deep:#2C1F1A;--mid:#7A5C54;--light:#B8A09A;--white:#FFFFFF;
      --bg1:#EEE8F4;--bg2:#F4EEF8;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg1);color:var(--deep);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;min-height:100vh}
    #root{min-height:100vh}
    canvas#fx{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200}

    /* ── FAIRY BG ── */
    .fairy-bg{
      position:fixed;inset:0;z-index:0;pointer-events:none;
      background:linear-gradient(160deg,#e8dff4 0%,#f0e8f8 30%,#e4f0e8 60%,#f8eef4 100%);
    }
    .fairy-bg::before{
      content:'';position:absolute;inset:0;
      background:
        radial-gradient(ellipse 60% 40% at 10% 20%,rgba(184,164,220,0.35) 0%,transparent 70%),
        radial-gradient(ellipse 50% 60% at 90% 80%,rgba(168,197,160,0.3) 0%,transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 10%,rgba(240,221,213,0.4) 0%,transparent 70%);
    }
    .fairy-trees{position:absolute;inset:0;overflow:hidden}
    .fairy-trees svg{position:absolute;opacity:0.18}

    /* ── FLOATING PARTICLES ── */
    .particle{position:fixed;pointer-events:none;z-index:1;animation:drift linear infinite;opacity:0}
    @keyframes drift{
      0%{transform:translateY(100vh) rotate(0deg);opacity:0}
      10%{opacity:0.7}
      90%{opacity:0.4}
      100%{transform:translateY(-20px) rotate(360deg);opacity:0}
    }

    /* ── MAIN WRAPPER ── */
    .page{position:relative;z-index:2;min-height:100vh;padding:0 0 4rem}

    /* ── BANNER ── */
    .banner{
      text-align:center;padding:3rem 2rem 2rem;
      position:relative;
    }
    .banner-ivy{font-size:1.4rem;letter-spacing:0.1em;color:var(--mint);margin-bottom:0.5rem;display:block}
    .banner-title{
      font-family:'Dancing Script',cursive;
      font-size:clamp(2rem,7vw,4.5rem);
      color:var(--purple);
      text-shadow:0 2px 20px rgba(155,123,181,0.3);
      line-height:1.2;margin-bottom:0.5rem;
    }
    .banner-sub{
      font-family:'Cormorant Garamond',serif;
      font-style:italic;
      font-size:clamp(1rem,3vw,1.5rem);
      color:var(--gold);
      letter-spacing:0.05em;
    }
    .banner-stars{font-size:1.2rem;letter-spacing:0.3em;margin-top:0.75rem;color:var(--lavender);display:block}
    .banner-divider{
      width:200px;height:2px;margin:1.5rem auto 0;
      background:linear-gradient(90deg,transparent,var(--lavender),var(--gold),var(--lavender),transparent);
    }

    /* ── SECTION LABEL ── */
    .sec-label{
      font-size:0.7rem;font-weight:500;letter-spacing:0.35em;text-transform:uppercase;
      color:var(--purple);margin-bottom:1.75rem;display:block;text-align:center;
    }

    /* ── PHOTO GALLERY ── */
    .gallery{
      max-width:860px;margin:0 auto;
      display:flex;justify-content:center;gap:1.5rem;
      padding:0.5rem 2rem 3rem;flex-wrap:wrap;
    }
    .photo-frame{
      position:relative;cursor:pointer;flex-shrink:0;
      transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .photo-frame:nth-child(1){transform:rotate(-2deg)}
    .photo-frame:nth-child(2){transform:rotate(1deg);margin-top:-10px}
    .photo-frame:nth-child(3){transform:rotate(-1.5deg)}
    .photo-frame:hover{transform:rotate(0deg) scale(1.06) !important;z-index:10}
    .photo-frame:hover .photo-overlay{opacity:1;transform:translateY(0)}
    .photo-border{
      padding:10px 10px 28px;
      background:linear-gradient(135deg,#f5f0fa,#fff,#f5f0fa);
      box-shadow:0 6px 30px rgba(100,70,130,0.18),0 2px 8px rgba(100,70,130,0.1),inset 0 0 0 1px rgba(200,180,220,0.4);
      border-radius:2px;
    }
    .photo-img{
      width:clamp(150px,22vw,210px);
      aspect-ratio:3/4;object-fit:cover;object-position:top;
      display:block;border-radius:1px;
    }
    .photo-caption{
      text-align:center;margin-top:8px;padding:0 4px;
      font-family:'Dancing Script',cursive;font-size:0.9rem;
      color:var(--purple);line-height:1.2;
    }
    .photo-overlay{
      position:absolute;inset:10px 10px 28px;border-radius:1px;
      background:rgba(155,123,181,0.5);
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity 0.3s ease,transform 0.3s ease;transform:translateY(6px);
    }
    .photo-overlay span{font-family:'Dancing Script',cursive;font-size:1.1rem;color:#fff;text-align:center;padding:0.75rem;line-height:1.4}

    /* ── MAGIC ROW ── */
    .magic-row{
      max-width:860px;margin:0 auto;
      display:flex;justify-content:center;gap:2rem;
      padding:0 2rem 2rem;flex-wrap:wrap;align-items:flex-start;
    }

    /* ── SCROLL LETTER ── */
    .scroll-wrap{position:relative;cursor:pointer;flex:1;min-width:260px;max-width:380px}
    .scroll-outer{
      background:linear-gradient(160deg,#f5eedc,#faf5e8,#f0e8d0);
      border-radius:8px 8px 50% 50%/8px 8px 20px 20px;
      box-shadow:0 8px 40px rgba(180,140,60,0.2),0 2px 8px rgba(180,140,60,0.15),inset 0 0 20px rgba(255,240,180,0.3);
      padding:2.5rem 2rem 3rem;
      position:relative;overflow:hidden;
      border:1px solid rgba(210,180,100,0.3);
      transition:transform 0.3s ease,box-shadow 0.3s ease;
    }
    .scroll-outer:hover{transform:translateY(-4px);box-shadow:0 12px 50px rgba(180,140,60,0.28)}
    .scroll-outer::before,.scroll-outer::after{
      content:'';position:absolute;left:0;right:0;height:20px;
      background:linear-gradient(160deg,#e8dcb8,#f5eedc,#e8dcb8);
      border-radius:50%;
    }
    .scroll-outer::before{top:-10px}
    .scroll-outer::after{bottom:-10px}
    .scroll-title{font-family:'Dancing Script',cursive;font-size:1.4rem;color:var(--gold);margin-bottom:0.75rem;text-align:center}
    .scroll-preview{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:#7a6030;line-height:1.7;text-align:center}
    .scroll-cta{
      display:block;text-align:center;margin-top:1.25rem;
      font-family:'Dancing Script',cursive;font-size:1.1rem;
      color:var(--purple);animation:glow-pulse 2s ease-in-out infinite;
    }
    .quill{position:absolute;bottom:1rem;right:1.5rem;font-size:1.5rem;opacity:0.5;transform:rotate(-20deg)}
    @keyframes glow-pulse{0%,100%{opacity:0.7;text-shadow:none}50%{opacity:1;text-shadow:0 0 12px rgba(155,123,181,0.5)}}

    /* ── GIFT BOX ── */
    .gift-wrap{cursor:pointer;flex-shrink:0;text-align:center}
    .gift-box{
      display:inline-block;
      font-size:clamp(4rem,12vw,7rem);
      animation:gift-float 3s ease-in-out infinite;
      filter:drop-shadow(0 8px 20px rgba(155,123,181,0.3));
      transition:transform 0.2s ease;
    }
    .gift-box:hover{transform:scale(1.1) rotate(5deg)}
    .gift-box:active{transform:scale(0.95)}
    @keyframes gift-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .gift-label{font-family:'Dancing Script',cursive;font-size:1.1rem;color:var(--purple);margin-top:0.5rem;display:block}
    .gift-sublabel{font-size:0.75rem;color:var(--light);letter-spacing:0.05em;margin-top:0.25rem}

    /* ── MODAL ── */
    .modal-overlay{
      position:fixed;inset:0;z-index:500;
      background:rgba(44,31,26,0.6);backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;padding:1.5rem;
      animation:fade-modal 0.3s ease;
    }
    @keyframes fade-modal{from{opacity:0}to{opacity:1}}
    .modal-box{
      max-width:580px;width:100%;position:relative;
      animation:pop-modal 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes pop-modal{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-close{
      position:absolute;top:-14px;right:-14px;width:32px;height:32px;
      background:var(--purple);color:#fff;border:none;border-radius:50%;
      font-size:1rem;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 12px rgba(100,70,130,0.3);
    }
    /* Letter modal */
    .letter-modal{
      background:linear-gradient(160deg,#f5eedc,#faf5e8,#f0e8d0);
      border-radius:8px;padding:3rem 2.5rem;
      box-shadow:0 20px 60px rgba(100,60,20,0.25);
      border:1px solid rgba(210,180,100,0.3);
      max-height:85vh;overflow-y:auto;
      position:relative;
    }
    .letter-modal::before,.letter-modal::after{
      content:'';position:absolute;left:0;right:0;height:20px;
      background:linear-gradient(160deg,#e8dcb8,#f5eedc,#e8dcb8);border-radius:50%;
    }
    .letter-modal::before{top:-10px}
    .letter-modal::after{bottom:-10px}
    .letter-modal h2{font-family:'Dancing Script',cursive;font-size:2rem;color:var(--gold);text-align:center;margin-bottom:1.5rem}
    .letter-modal p{font-family:'Cormorant Garamond',serif;font-size:1.1rem;line-height:1.9;color:#5a4020;margin-bottom:1.2rem}
    .letter-modal .sign{margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid rgba(210,180,100,0.3);font-family:'Dancing Script',cursive;font-size:1.2rem;color:var(--gold)}
    /* Gift modal */
    .gift-modal{
      background:linear-gradient(135deg,#f0e8f8,#faf5ff,#e8f0f8);
      border-radius:16px;padding:3rem 2.5rem;text-align:center;
      box-shadow:0 20px 60px rgba(100,70,130,0.25);
      border:1px solid rgba(200,180,220,0.4);
    }
    .gift-modal-icon{font-size:5rem;display:block;margin-bottom:1rem;animation:unwrap 0.6s cubic-bezier(0.34,1.56,0.64,1)}
    @keyframes unwrap{0%{transform:scale(0) rotate(-20deg)}100%{transform:scale(1) rotate(0deg)}}
    .gift-modal h2{font-family:'Dancing Script',cursive;font-size:2.2rem;color:var(--purple);margin-bottom:1rem}
    .gift-modal p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.2rem;color:var(--mid);line-height:1.7}
    .gift-modal .amount{font-family:'Dancing Script',cursive;font-size:1.6rem;color:var(--gold);margin-top:1rem;display:block}



    footer{text-align:center;padding:2rem;font-family:'Dancing Script',cursive;font-size:1rem;color:var(--lavender)}

    .fade-in{opacity:0;transform:translateY(22px);transition:opacity 0.7s ease,transform 0.7s ease}
    .fade-in.visible{opacity:1;transform:translateY(0)}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--purple);color:#fff;padding:0.75rem 1.75rem;border-radius:999px;font-size:0.82rem;letter-spacing:0.05em;opacity:0;transition:opacity 0.3s ease,transform 0.3s ease;z-index:300;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .heart-burst{position:fixed;pointer-events:none;z-index:400;font-size:1.5rem;animation:burst 0.9s ease forwards}
    @keyframes burst{0%{opacity:1;transform:translateY(0) scale(0.5)}60%{opacity:1;transform:translateY(-65px) scale(1.2)}100%{opacity:0;transform:translateY(-100px) scale(0.8)}}


    /* ── MUSIC PLAYER ── */
    .music-btn {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 300;
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
      border: 1.5px solid rgba(200,180,220,0.5); border-radius: 999px;
      padding: 0.5rem 1rem 0.5rem 0.6rem;
      cursor: pointer; box-shadow: 0 4px 20px rgba(155,123,181,0.2);
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
      color: var(--purple); font-weight: 500;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .music-btn:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(155,123,181,0.3); }
    .music-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--lavender));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0;
    }
    .music-bars {
      display: flex; align-items: flex-end; gap: 2px; height: 14px;
    }
    .music-bars span {
      display: block; width: 3px; background: var(--purple); border-radius: 2px;
      animation: bar-bounce 0.8s ease-in-out infinite;
    }
    .music-bars span:nth-child(1) { height: 6px; animation-delay: 0s; }
    .music-bars span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
    .music-bars span:nth-child(3) { height: 8px; animation-delay: 0.3s; }
    .music-bars span:nth-child(4) { height: 10px; animation-delay: 0.1s; }
    .music-bars.paused span { animation-play-state: paused; height: 4px !important; }
    @keyframes bar-bounce {
      0%,100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1); }
    }
    .music-label { max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    @media(max-width:600px){
      .magic-row{flex-direction:column;align-items:center}
      .scroll-wrap{max-width:100%}
    }
    @media(prefers-reduced-motion:reduce){
      .fade-in{opacity:1;transform:none;transition:none}
      .particle,.gift-box{animation:none}
    }
  </style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CONFETTI ──
function runConfetti() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const canvas = document.getElementById('fx');
  const ctx = canvas.getContext('2d');
  const colors = ['#C97D6E','#F0DDD5','#B89AC8','#D4B8E0','#A8C5A0','#D4A853','#ffffff'];
  let W = canvas.width = window.innerWidth;
  let H = canvas.height = window.innerHeight;
  const pieces = Array.from({length:160},()=>({
    x:Math.random()*W, y:Math.random()*-H,
    w:Math.random()*10+4, h:Math.random()*5+2,
    color:colors[Math.floor(Math.random()*colors.length)],
    speed:Math.random()*2.5+1, angle:0,
    tiltSpeed:Math.random()*0.1+0.04,
    opacity:Math.random()*0.7+0.3,
    shape:Math.random()>0.7?'circle':'rect',
  }));
  const start = performance.now();
  function loop(ts) {
    ctx.clearRect(0,0,W,H);
    if(ts-start>6000) return;
    pieces.forEach(p=>{
      p.y+=p.speed; p.angle+=p.tiltSpeed;
      const tilt=Math.sin(p.angle)*12;
      if(p.y>H+20){p.y=-20;p.x=Math.random()*W}
      ctx.save(); ctx.globalAlpha=p.opacity; ctx.fillStyle=p.color;
      ctx.translate(p.x,p.y); ctx.rotate(tilt*Math.PI/180);
      if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill()}
      else{ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h)}
      ctx.restore();
    });
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

// ── FLOATING PARTICLES ──
function createParticles() {
  const emojis = ['✨','🌸','🦋','⭐','💫','🌿','🌷'];
  for(let i=0;i<18;i++){
    const el = document.createElement('div');
    el.className='particle';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.cssText=`
      left:${Math.random()*100}vw;
      font-size:${Math.random()*14+10}px;
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*10}s;
    `;
    document.body.appendChild(el);
  }
}

// ── HEARTS ──
function spawnHeart(x,y) {
  const items=['🌸','💜','✨','👑','💕','🌷','⭐','🩺'];
  for(let i=0;i<7;i++){
    const el=document.createElement('div');
    el.className='heart-burst';
    el.textContent=items[Math.floor(Math.random()*items.length)];
    el.style.left=(x+(Math.random()-0.5)*100)+'px';
    el.style.top=(y-20)+'px';
    el.style.animationDelay=(Math.random()*0.3)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1100);
  }
}

// ── FADE IN ──
function useFadeIn() {
  useEffect(()=>{
    const els=document.querySelectorAll('.fade-in');
    const obs=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}})
    },{threshold:0.08});
    els.forEach(el=>obs.observe(el));
    return()=>obs.disconnect();
  },[]);
}


// ── LETTER MODAL ──
function LetterModal({onClose}) {
  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-box">
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="letter-modal">
          <h2>A Letter for You 🌸</h2>
          <p>To Hannah,</p>
          <p>You are graduating now, and I don't think I've fully processed it yet.</p>
          <p>Maybe because when I think of you, I still see the little girl who just wanted to be where I was. The funny thing is… as I've gotten older, I've realised there are so many things about you I wish I had in me.</p>
          <p>I can still remember how heartbroken you were when vet school didn't work out. I remember how much it broke you at the time. I remember how anxious you felt in the first few months of nursing school because you could not make friends.</p>
          <p>But look at you now.</p>
          <p>You didn't stay there. You kept going. You found another path and made it your own. You made good friends that you will carry for life.</p>
          <p>You give so much of yourself to the people around you. More than you realise.</p>
          <p>And I'll always learn from that.</p>
          <p>As you become a nurse, you're going to see people on some of the worst days of their lives. You're going to witness things that are unfair, heartbreaking, and just cruel. Sometimes the world will make you feel like you need to toughen up or care less to survive. But don't. As I told you when you first got your heart broken — don't let those things dim your light.</p>
          <p>I've seen how deeply you feel everything. You experience joy, sadness, excitement, disappointment, love... all of it, so fully. You have such a big heart. And I actually think that's one, out of so many, of the most beautiful things about you.</p>
          <p>Since I moved away, I know I haven't always been there. There are moments, milestones, ordinary days, and difficult days that I missed simply because I was not around. I wish I could have been beside you for more of them.</p>
          <p>But none of that has ever changed how proud I am of you.</p>
          <p>Not once.</p>
          <p>I am proud of the woman you've become.<br/>I am proud of the way you love people.<br/>I am proud of the way you keep going.<br/>I am proud of your courage.</p>
          <p>And if I'm being honest, I'm excited to see who you become next — because if this is who you are now, I can only imagine the woman you'll grow into.</p>
          <p>No matter how old we get, you'll always be my little sister. The little girl who somehow still loves me, believes in me, and sees the best in me even when I can't see it myself.</p>
          <p>Thank you for that.</p>
          <p>I love you more than you'll ever know.</p>
          <div className="sign">Congratulations, Nurse Hannah. 🌸</div>
        </div>
      </div>
    </div>
  );
}

// ── GIFT MODAL ──
function GiftModal({onClose}) {
  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-box">
        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="gift-modal">
          <span className="gift-modal-icon">🎁</span>
          <h2>Your Graduation Gift!</h2>
          <p>Because you worked so hard and you deserve something special from Ate —</p>
          <span className="amount">Graduation money sent to your<br/>Maribank on the 15th! 💜</span>
          <p style={{marginTop:'1.5rem',fontSize:'0.95rem',opacity:0.7}}>Treat yourself, Han. You earned it. 🌸</p>
        </div>
      </div>
    </div>
  );
}

// ── APP ──
function App() {
  const [toast,setToast]=useState('');
  const toastTimer=useRef(null);
  function showToast(msg){setToast(msg);clearTimeout(toastTimer.current);toastTimer.current=setTimeout(()=>setToast(''),2800);}
  const [showLetter,setShowLetter]=useState(false);
  const [showGift,setShowGift]=useState(false);
  const [muted,setMuted]=useState(true);
  const [musicStarted,setMusicStarted]=useState(false);

  function toggleMute() {
    if (!musicStarted) {
      setMusicStarted(true);
      setMuted(false);
      return;
    }
    const iframe = document.getElementById('yt-player');
    if (!iframe) return;
    const newMuted = !muted;
    setMuted(newMuted);
    const cmd = newMuted
      ? JSON.stringify({event:'command',func:'mute',args:[]})
      : JSON.stringify({event:'command',func:'unMute',args:[]});
    try { iframe.contentWindow.postMessage(cmd, '*'); } catch(e) {}
  }

  useFadeIn();

  useEffect(()=>{
    createParticles();
    runConfetti();

  },[]);

  function showToast(msg){
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToast(''),2800);
  }


  const photos=[
    {src:window.IMG_GRAD_BALL,caption:'Grad Ball 👑',overlay:'my little fairy ✨'},
    {src:window.IMG_NURSE,caption:'Hannah · RN 🩺',overlay:'so proud of you 🌸'},
    {src:window.IMG_TOGA,caption:'Our Graduate 🎓',overlay:'look at you go! 💜'},
  ];

  return (
    <>
      <div className="page">
        {/* BANNER */}
        <div className="banner fade-in">
          <span className="banner-ivy">🍃 ✨ 🍃</span>
          <h1 className="banner-title">I'm so, so proud of you,<br/>our future RN!</h1>
          <p className="banner-sub">Congratulations, Hannah · Class of 2025</p>
          <span className="banner-stars">✦ ✦ ✦ ✦ ✦</span>
          <div className="banner-divider"/>
        </div>

        {/* GALLERY */}
        <div style={{textAlign:'center',paddingTop:'1rem'}}>
          <span className="sec-label fade-in">✨ Magical Memory Gallery ✨</span>
        </div>
        <div className="gallery fade-in">
          {photos.map((p,i)=>(
            <div className="photo-frame" key={i} onClick={e=>{spawnHeart(e.clientX,e.clientY)}}>
              <div className="photo-border">
                <img className="photo-img" src={"data:image/jpeg;base64,"+p.src} alt={p.caption} />
                <div className="photo-caption">{p.caption}</div>
              </div>
              <div className="photo-overlay"><span>{p.overlay}</span></div>
            </div>
          ))}
        </div>

        {/* LETTER + GIFT ROW */}
        <div className="magic-row fade-in">
          {/* SCROLL LETTER */}
          <div className="scroll-wrap" onClick={()=>{setShowLetter(true);runConfetti()}}>
            <div className="scroll-outer">
              <h3 className="scroll-title">A Letter for the Graduate</h3>
              <p className="scroll-preview">
                "You are graduating now, and I don't think I've fully processed it yet..."
              </p>
              <span className="scroll-cta">✨ Click me to read my graduation letter to you ✨</span>
              <span className="quill">🪶</span>
            </div>
          </div>

          {/* GIFT */}
          <div className="gift-wrap" onClick={e=>{setShowGift(true);spawnHeart(e.clientX,e.clientY)}}>
            <div className="gift-box">🎁</div>
            <span className="gift-label">Your Magical Gift Awaits</span>
            <span className="gift-sublabel">click to open ✨</span>
          </div>
        </div>


        <footer>Made with love by Ate Sharlene · 2025 🌸✨</footer>
      </div>


      {/* YOUTUBE AUDIO */}
      <iframe
        id="yt-player"
        style={{display:'none'}}
        src={musicStarted
          ? "https://www.youtube.com/embed/T1J_4lgLun0?autoplay=1&mute=" + (muted?'1':'0') + "&loop=1&playlist=T1J_4lgLun0&enablejsapi=1"
          : ""}
        allow="autoplay"
        title="background music"
      />

      {/* MUSIC BUTTON */}
      <button className="music-btn" onClick={toggleMute} title={muted?'Unmute':'Mute'}>
        <div className="music-icon">🎵</div>
        <div className={`music-bars ${muted?'paused':''}`}>
          <span/><span/><span/><span/>
        </div>
        <span className="music-label">{!musicStarted ? 'Play Hannah\'s song ♪' : muted ? 'Unmute ♪' : 'Whistle for the Choir'}</span>
      </button>

      {showLetter&&<LetterModal onClose={()=>setShowLetter(false)}/>}
      {showGift&&<GiftModal onClose={()=>setShowGift(false)}/>}
      <div className={`toast ${toast?'show':''}`}>{toast}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
